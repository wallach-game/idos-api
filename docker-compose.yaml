version: "3.9"

services:
  idos-api:
    build: .
    container_name: idos-api
    ports:
      - "8001:8000"   # FastAPI
      - "6081:6080"   # noVNC
      - "5901:5900"   # VNC
    volumes:
      - ./app.py:/app/app.py
      - ./routes.py:/app/routes.py
      - playwright_data:/root/.cache/ms-playwright
    environment:
      WEB_PORT: 6080
    stdin_open: true
    tty: true

volumes:
  playwright_data:
